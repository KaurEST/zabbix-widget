<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coop Locations Lookup</title>
  <style>
    :root{
      --bg:#0b1020;/* deep navy */
      --card:#121938;/* slightly lighter */
      --muted:#8ea0ff;
      --text:#e6e9ff;
      --text-dim:#a9b2e8;
      --accent:#5b7cff;
      --accent-2:#35d1ff;
      --ring: 0 0 0 3px rgba(91,124,255,.25);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;height:100%;background:radial-gradient(1200px 600px at 10% -10%,rgba(53,209,255,.08),transparent 60%),
                             radial-gradient(1200px 600px at 110% 10%,rgba(91,124,255,.10),transparent 60%), var(--bg);
               color:var(--text);font:16px/1.45 system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, "Apple Color Emoji","Segoe UI Emoji"}
    .wrap{max-width:1100px;margin:5px auto;padding:0 20px}
    .title{font-size:clamp(26px,2.5vw,34px);font-weight:800;letter-spacing:.2px;margin:0 0 6px}
    .subtitle{color:var(--text-dim);margin:0 0 22px}

    .panel{background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
           border:1px solid rgba(255,255,255,.10);border-radius:var(--radius);padding:16px;box-shadow:0 8px 28px rgba(0,0,0,.25)}

    .controls{display:flex;gap:10px;flex-wrap:wrap}
    .search{position:relative;flex:1 1 360px}
    .search input{width:100%;padding:14px 44px 14px 44px;border-radius:12px;border:1px solid rgba(255,255,255,.16);
                  background:rgba(14,18,38,.7);color:var(--text);outline:none}
    .search input:focus{box-shadow:var(--ring);border-color:rgba(91,124,255,.55)}
    .search .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.8}
    .count{padding:12px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);
           border-radius:12px;white-space:nowrap}

    table{width:100%;border-collapse:separate;border-spacing:0;margin-top:14px}
    thead th{position:sticky;top:0;background:rgba(12,18,40,.9);backdrop-filter:blur(8px);text-align:left;font-weight:700;
             border-bottom:1px solid rgba(255,255,255,.12);padding:12px;border-top-left-radius:12px;border-top-right-radius:12px}
    tbody tr{transition:background .15s ease}
    tbody tr:hover{background:rgba(255,255,255,.04)}
    td{padding:12px;border-bottom:1px dashed rgba(255,255,255,.08);vertical-align:top}
    .code{font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
          font-weight:600;color:var(--muted)}

    .muted{color:var(--text-dim)}

    .footer{margin-top:14px;color:var(--text-dim);font-size:13px}
    .pill{display:inline-block;padding:4px 10px;border:1px solid rgba(255,255,255,.12);border-radius:999px;margin-left:8px}

    @media (prefers-color-scheme: light){
      :root{--bg:#f6f8ff;--card:#ffffff;--text:#0b1020;--text-dim:#4f5b8a}
      body{background:radial-gradient(1200px 600px at 10% -10%,rgba(53,209,255,.10),transparent 60%),
                      radial-gradient(1200px 600px at 110% 10%,rgba(91,124,255,.15),transparent 60%), var(--bg)}
      .panel{background:#fff}
    }
  </style>
</head>

          <input id="q" type="search" placeholder="Search… (e.g. h01, Konsum, Tartu)" autocomplete="off" />
        </div>
        <div class="count"><span id="count">0</span> shown <span class="muted">/ <span id="total">0</span> total</span></div>
      </div>

      <table aria-label="Locations table">

            <th>Nimi</th>

        </thead>
        <tbody id="rows"></tbody>

    </div>

    const rowsEl = document.getElementById('rows');
    const qEl = document.getElementById('q');
    const countEl = document.getElementById('count');
    const totalEl = document.getElementById('total');

    function render(list){
      rowsEl.innerHTML = list.map(([code,name])=>`<tr><td class="code">${code}</td><td>${name}</td></tr>`).join('');
      countEl.textContent = list.length;
    }

    function normalize(s){
      return s.toLowerCase().normalize('NFKD');
    }

    function filter(){
      const q = normalize(qEl.value.trim());
      if(!q){ render(data); return; }
      const parts = q.split(/\s+/).filter(Boolean);
      const filtered = data.filter(([code,name])=>{
        const hay = normalize(code+" "+name);
        return parts.every(p=>hay.includes(p));
      });
      render(filtered);
    }

    // init
    totalEl.textContent = data.length;
    render(data);

    // events (with a small debounce)
    let t;
    qEl.addEventListener('input', ()=>{ clearTimeout(t); t=setTimeout(filter, 80); });
    // focus search on load
